<svg viewBox="0 0 740 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <!-- ====== Definiciones ====== -->
  <defs>
    <pattern id="hatch" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#ededed"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#1a1a1a" stroke-width="1.1"/>
    </pattern>
  </defs>

  <!-- Estilos compartidos -->
  <style>
    .box  { fill:#ededed; stroke:#1a1a1a; stroke-width:1.4; }
    .lbl  { fill:#000; font-size:13px; }
    .sm   { fill:#000; font-size:11.5px; }
    .cap  { fill:#000; font-size:14px; font-style:italic; }
    .brk  { fill:none; stroke:#1a1a1a; stroke-width:1.2; }
    .lead { fill:none; stroke:#1a1a1a; stroke-width:1; }
  </style>

  <!-- Fondo gris del recuadro (borralo si querés fondo transparente) -->
  <rect x="0" y="0" width="740" height="600" fill="#d9d9d9"/>

  <!-- ===================================================== -->
  <!-- (a)  ESTRUCTURA DE UN MÓDULO OBJETO                   -->
  <!-- ===================================================== -->

  <!-- Encabezado: rejilla de campos -->
  <rect class="box" x="95" y="65"  width="160" height="23"/>
  <rect class="box" x="95" y="88"  width="160" height="23"/>
  <rect class="box" x="95" y="111" width="160" height="23"/>
  <rect class="box" x="95" y="134" width="160" height="23"/>
  <rect class="box" x="95" y="157" width="160" height="30"/>
  <rect class="box" x="95" y="187" width="160" height="23"/>
  <rect class="box" x="95" y="210" width="160" height="26" fill="url(#hatch)"/>
  <rect class="box" x="95" y="236" width="160" height="30"/>

  <text class="sm" x="175" y="80"  text-anchor="middle">Número mágico</text>
  <text class="sm" x="175" y="103" text-anchor="middle">Tamaño del texto</text>
  <text class="sm" x="175" y="126" text-anchor="middle">Tamaño de los datos</text>
  <text class="sm" x="175" y="149" text-anchor="middle">Tamaño del BSS</text>
  <text class="sm" x="175" y="170" text-anchor="middle">Tamaño de la tabla</text>
  <text class="sm" x="175" y="183" text-anchor="middle">de símbolos</text>
  <text class="sm" x="175" y="202" text-anchor="middle">Punto de entrada</text>
  <text class="sm" x="175" y="255" text-anchor="middle">Banderas</text>

  <!-- Secciones grandes -->
  <rect class="box" x="95" y="266" width="160" height="64"/>
  <rect class="box" x="95" y="330" width="160" height="64"/>
  <rect class="box" x="95" y="394" width="160" height="56"/>
  <rect class="box" x="95" y="450" width="160" height="72"/>

  <text class="lbl" x="175" y="302" text-anchor="middle">Texto</text>
  <text class="lbl" x="175" y="366" text-anchor="middle">Datos</text>
  <text class="sm"  x="175" y="426" text-anchor="middle">Bits de reubicación</text>
  <text class="sm"  x="175" y="481" text-anchor="middle">Tabla de</text>
  <text class="sm"  x="175" y="494" text-anchor="middle">símbolos</text>

  <!-- Marcas de "ruptura" (~) en el borde izquierdo de las secciones grandes -->
  <path class="brk" d="M 88 270 q 6 5 0 10 q -6 5 0 10"/>
  <path class="brk" d="M 88 334 q 6 5 0 10 q -6 5 0 10"/>
  <path class="brk" d="M 88 398 q 6 5 0 10 q -6 5 0 10"/>
  <path class="brk" d="M 88 454 q 6 5 0 10 q -6 5 0 10"/>

  <!-- Llave/etiqueta "Encabezado" a la izquierda -->
  <path class="brk" d="M 58 65 h -8 v 201 h 8" stroke-width="1.3"/>
  <text class="sm" x="44" y="170" text-anchor="middle"
        transform="rotate(-90 44 170)">Encabezado</text>

  <!-- Etiqueta (a) -->
  <text class="cap" x="175" y="548" text-anchor="middle">(a)</text>

  <!-- ===================================================== -->
  <!-- (b)  ESTRUCTURA DE UNA BIBLIOTECA / ARCHIVO           -->
  <!-- ===================================================== -->

  <rect class="box" x="330" y="65"  width="130" height="45"/>
  <rect class="box" x="330" y="110" width="130" height="105"/>
  <rect class="box" x="330" y="215" width="130" height="45"/>
  <rect class="box" x="330" y="260" width="130" height="105"/>
  <rect class="box" x="330" y="365" width="130" height="45"/>
  <rect class="box" x="330" y="410" width="130" height="105"/>

  <text class="sm" x="395" y="92"  text-anchor="middle">Encabezado</text>
  <text class="sm" x="395" y="158" text-anchor="middle">Módulo</text>
  <text class="sm" x="395" y="172" text-anchor="middle">objeto</text>
  <text class="sm" x="395" y="242" text-anchor="middle">Encabezado</text>
  <text class="sm" x="395" y="308" text-anchor="middle">Módulo</text>
  <text class="sm" x="395" y="322" text-anchor="middle">objeto</text>
  <text class="sm" x="395" y="392" text-anchor="middle">Encabezado</text>
  <text class="sm" x="395" y="458" text-anchor="middle">Módulo</text>
  <text class="sm" x="395" y="472" text-anchor="middle">objeto</text>

  <!-- Etiqueta (b) -->
  <text class="cap" x="395" y="548" text-anchor="middle">(b)</text>

  <!-- ===================================================== -->
  <!-- Vista expandida del Encabezado                        -->
  <!-- ===================================================== -->

  <!-- Líneas guía desde el primer Encabezado a la vista expandida -->
  <line class="lead" x1="460" y1="65"  x2="530" y2="40"/>
  <line class="lead" x1="460" y1="110" x2="530" y2="270"/>

  <rect class="box" x="530" y="40"  width="130" height="70"/>
  <rect class="box" x="530" y="110" width="130" height="45"/>
  <rect class="box" x="530" y="155" width="130" height="30"/>
  <rect class="box" x="530" y="185" width="130" height="30"/>
  <rect class="box" x="530" y="215" width="130" height="55"/>

  <text class="sm" x="595" y="70"  text-anchor="middle">Nombre del</text>
  <text class="sm" x="595" y="84"  text-anchor="middle">módulo</text>
  <text class="sm" x="595" y="137" text-anchor="middle">Datos</text>
  <text class="sm" x="595" y="174" text-anchor="middle">Propietario</text>
  <text class="sm" x="595" y="204" text-anchor="middle">Protección</text>
  <text class="sm" x="595" y="246" text-anchor="middle">Tamaño</text>
</svg>
