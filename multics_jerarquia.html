<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jerarquía de memoria — MULTICS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f13;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      padding: 2rem;
    }
    .card {
      background: #1a1a24;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2rem;
      max-width: 780px;
      width: 100%;
    }

    /* ── SVG theme vars ── */
    svg { --t: rgba(255,255,255,0.85); --s: rgba(255,255,255,0.45); --bg2: #1e1e2a; --b: rgba(255,255,255,0.12); }

    /* text classes */
    svg text { font-family: system-ui, sans-serif; }
    svg text.th { font-size: 14px; font-weight: 500; fill: var(--t); }
    svg text.ts { font-size: 12px; font-weight: 400; fill: var(--s); }

    /* box (neutral) */
    svg .box { fill: #252535; stroke: rgba(255,255,255,0.15); }

    /* arr */
    svg .arr { stroke: var(--s); stroke-width: 1.5px; fill: none; }

    /* color ramps — dark mode */
    svg .c-gray  > rect, svg .c-gray  > circle, svg .c-gray  > ellipse { fill: #444441; stroke: #B4B2A9; }
    svg .c-gray  > text.th { fill: #D3D1C7; } svg .c-gray  > text.ts { fill: #B4B2A9; }

    svg .c-purple > rect, svg .c-purple > circle, svg .c-purple > ellipse { fill: #3C3489; stroke: #AFA9EC; }
    svg .c-purple > text.th { fill: #CECBF6; } svg .c-purple > text.ts { fill: #AFA9EC; }

    svg .c-teal  > rect, svg .c-teal  > circle, svg .c-teal  > ellipse { fill: #085041; stroke: #5DCAA5; }
    svg .c-teal  > text.th { fill: #9FE1CB; } svg .c-teal  > text.ts { fill: #5DCAA5; }

    svg .c-coral > rect, svg .c-coral > circle, svg .c-coral > ellipse { fill: #712B13; stroke: #F0997B; }
    svg .c-coral > text.th { fill: #F5C4B3; } svg .c-coral > text.ts { fill: #F0997B; }

    /* node hover */
    svg .node { cursor: default; }
  </style>
</head>
<body>
<div class="card">
<svg width="100%" viewBox="0 0 680 720" role="img">
<title>Jerarquía de memoria en MULTICS</title>
<desc>Diagrama jerárquico: SO gestiona PCBs, cada PCB apunta al segmento del descriptor, que tiene descriptores de segmento, cada uno apuntando a una tabla de páginas con marcos en RAM o disco.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- NIVEL 0: SO -->
<g class="node c-gray">
  <rect x="215" y="20" width="250" height="52" rx="10" stroke-width="0.5"/>
  <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">Sistema operativo</text>
  <text class="ts" x="340" y="59" text-anchor="middle" dominant-baseline="central">gestiona todos los PCBs</text>
</g>
<line x1="340" y1="72" x2="340" y2="108" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- NIVEL 1: PCB -->
<g class="node c-gray">
  <rect x="215" y="110" width="250" height="52" rx="10" stroke-width="0.5"/>
  <text class="th" x="340" y="130" text-anchor="middle" dominant-baseline="central">PCB — uno por proceso</text>
  <text class="ts" x="340" y="149" text-anchor="middle" dominant-baseline="central">dirección al seg. del descriptor</text>
</g>
<line x1="340" y1="162" x2="340" y2="198" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- NIVEL 2: SEGMENTO DEL DESCRIPTOR -->
<g class="node c-purple">
  <rect x="160" y="200" width="360" height="52" rx="10" stroke-width="0.5"/>
  <text class="th" x="340" y="220" text-anchor="middle" dominant-baseline="central">Segmento del descriptor</text>
  <text class="ts" x="340" y="239" text-anchor="middle" dominant-baseline="central">uno por proceso — tabla maestra</text>
</g>
<line x1="175" y1="252" x2="115" y2="298" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340"  y1="252" x2="340"  y2="298" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="505" y1="252" x2="565" y2="298" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>

<!-- NIVEL 3: DESCRIPTORES -->
<g class="node c-purple">
  <rect x="30" y="300" width="170" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="115" y="320" text-anchor="middle" dominant-baseline="central">Descriptor seg 0</text>
  <text class="ts" x="115" y="339" text-anchor="middle" dominant-baseline="central">código · r-x · 3 págs</text>
</g>
<g class="node c-purple">
  <rect x="255" y="300" width="170" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="320" text-anchor="middle" dominant-baseline="central">Descriptor seg 1</text>
  <text class="ts" x="340" y="339" text-anchor="middle" dominant-baseline="central">stack · rw- · 2 págs</text>
</g>
<g class="node c-purple">
  <rect x="480" y="300" width="170" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="565" y="320" text-anchor="middle" dominant-baseline="central">Descriptor seg 2</text>
  <text class="ts" x="565" y="339" text-anchor="middle" dominant-baseline="central">heap · rw- · 2 págs</text>
</g>
<line x1="115" y1="352" x2="115" y2="398" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="352" x2="340" y2="398" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="565" y1="352" x2="565" y2="398" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="378" text-anchor="middle" fill="#888780">puntero a tabla de páginas</text>

<!-- NIVEL 4: TABLAS DE PÁGINAS -->
<g class="c-teal">
  <rect x="30" y="400" width="170" height="100" rx="8" stroke-width="0.5"/>
  <text class="th" x="115" y="420" text-anchor="middle" dominant-baseline="central">Tabla de páginas</text>
</g>
<rect x="44" y="433" width="142" height="22" rx="4" class="box" stroke-width="0.5"/>
<text class="ts" x="115" y="444" text-anchor="middle" dominant-baseline="central">pág 0 → Marco 14 RAM</text>
<rect x="44" y="459" width="142" height="22" rx="4" class="box" stroke-width="0.5" opacity="0.6"/>
<text class="ts" x="115" y="470" text-anchor="middle" dominant-baseline="central">pág 1 → disco</text>
<rect x="44" y="483" width="142" height="12" rx="4" class="box" stroke-width="0.5" opacity="0.3"/>

<g class="c-teal">
  <rect x="255" y="400" width="170" height="100" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="420" text-anchor="middle" dominant-baseline="central">Tabla de páginas</text>
</g>
<rect x="269" y="433" width="142" height="22" rx="4" class="box" stroke-width="0.5"/>
<text class="ts" x="340" y="444" text-anchor="middle" dominant-baseline="central">pág 0 → Marco 33 RAM</text>
<rect x="269" y="459" width="142" height="22" rx="4" class="box" stroke-width="0.5" opacity="0.6"/>
<text class="ts" x="340" y="470" text-anchor="middle" dominant-baseline="central">pág 1 → Marco 89 RAM</text>

<g class="c-teal">
  <rect x="480" y="400" width="170" height="100" rx="8" stroke-width="0.5"/>
  <text class="th" x="565" y="420" text-anchor="middle" dominant-baseline="central">Tabla de páginas</text>
</g>
<rect x="494" y="433" width="142" height="22" rx="4" class="box" stroke-width="0.5"/>
<text class="ts" x="565" y="444" text-anchor="middle" dominant-baseline="central">pág 0 → disco</text>
<rect x="494" y="459" width="142" height="22" rx="4" class="box" stroke-width="0.5" opacity="0.6"/>
<text class="ts" x="565" y="470" text-anchor="middle" dominant-baseline="central">pág 1 → Marco 7 RAM</text>

<line x1="115" y1="500" x2="115" y2="546" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="500" x2="340" y2="546" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="565" y1="500" x2="565" y2="546" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>

<!-- NIVEL 5: SEGMENTOS -->
<g class="node c-coral">
  <rect x="30" y="548" width="170" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="115" y="568" text-anchor="middle" dominant-baseline="central">Segmento 0</text>
  <text class="ts" x="115" y="587" text-anchor="middle" dominant-baseline="central">código — bytes crudos</text>
</g>
<g class="node c-coral">
  <rect x="255" y="548" width="170" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="568" text-anchor="middle" dominant-baseline="central">Segmento 1</text>
  <text class="ts" x="340" y="587" text-anchor="middle" dominant-baseline="central">stack — bytes crudos</text>
</g>
<g class="node c-coral">
  <rect x="480" y="548" width="170" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="565" y="568" text-anchor="middle" dominant-baseline="central">Segmento 2</text>
  <text class="ts" x="565" y="587" text-anchor="middle" dominant-baseline="central">heap — bytes crudos</text>
</g>

<!-- LEYENDA -->
<rect x="30" y="628" width="620" height="70" rx="8" class="box" stroke-width="0.5" opacity="0.4"/>
<text class="th" x="46" y="648" dominant-baseline="central" fill="rgba(255,255,255,0.85)">Uno por proceso:</text>
<text class="ts" x="195" y="648" dominant-baseline="central" fill="rgba(255,255,255,0.45)">PCB · segmento del descriptor</text>
<text class="th" x="46" y="672" dominant-baseline="central" fill="rgba(255,255,255,0.85)">Uno por segmento:</text>
<text class="ts" x="195" y="672" dominant-baseline="central" fill="rgba(255,255,255,0.45)">descriptor · tabla de páginas · segmento</text>
<line x1="430" y1="648" x2="458" y2="648" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="466" y="648" dominant-baseline="central" fill="rgba(255,255,255,0.45)">puntero</text>
<line x1="430" y1="668" x2="458" y2="668" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="466" y="668" dominant-baseline="central" fill="rgba(255,255,255,0.45)">marcos RAM/disco</text>
</svg>
</div>
</body>
</html>
